name: production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  artifact-smoke:
    uses: ./.github/workflows/reusable-integration.yml
    with:
      build_containers: true
      run_e2e: true
      run_migrations: true

  deploy-ec2:
    name: deploy-ec2
    needs:
      - artifact-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      APP_DIR: ${{ vars.EC2_APP_DIR }}
      EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
      EC2_PORT: ${{ secrets.AWS_EC2_PORT }}
      EC2_PRODUCTION_ENV: ${{ secrets.EC2_PRODUCTION_ENV }}
      EC2_SSH_KEY: ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
      EC2_USER: ${{ secrets.AWS_EC2_USER }}
      REPOSITORY_URL: ${{ vars.EC2_REPOSITORY_URL }}
    steps:
      - name: Validate deployment inputs
        run: |
          test -n "$EC2_HOST"
          test -n "$EC2_SSH_KEY"
          test -n "$EC2_USER"
          test -n "$EC2_PRODUCTION_ENV"

      - name: Resolve deployment defaults
        run: |
          if [ -z "$APP_DIR" ]; then
            echo "APP_DIR=/opt/gastroledger" >> "$GITHUB_ENV"
          fi
          if [ -z "$REPOSITORY_URL" ]; then
            echo "REPOSITORY_URL=https://github.com/Ainsiel/GastroLedger.git" >> "$GITHUB_ENV"
          fi

      - name: Configure SSH client
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/gastroledger_ec2
          chmod 600 ~/.ssh/gastroledger_ec2
          ssh-keyscan -p "${EC2_PORT:-22}" "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Check out or update repository on EC2
        run: |
          ssh -i ~/.ssh/gastroledger_ec2 -p "${EC2_PORT:-22}" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$APP_DIR' REPOSITORY_URL='$REPOSITORY_URL' bash -se" <<'REMOTE'
          set -Eeuo pipefail

          if [ -r /etc/os-release ]; then
            . /etc/os-release
          else
            ID=""
            VERSION_ID=""
          fi

          if [ "$ID" = "amzn" ] && [ "${VERSION_ID%%.*}" = "2023" ]; then
            sudo dnf update -y
            sudo dnf install -y git docker nginx python3
            sudo systemctl enable --now docker
            sudo systemctl enable --now nginx
          fi

          if ! command -v git >/dev/null 2>&1; then
            echo "git is required on the EC2 host." >&2
            exit 1
          fi
          if ! sudo docker version >/dev/null 2>&1; then
            echo "docker is required on the EC2 host." >&2
            exit 1
          fi
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64)
              COMPOSE_ARCH="x86_64"
              BUILDX_ARCH="amd64"
              ;;
            aarch64)
              COMPOSE_ARCH="aarch64"
              BUILDX_ARCH="arm64"
              ;;
            *) echo "Unsupported architecture for Docker plugins: $ARCH" >&2; exit 1 ;;
          esac

          sudo mkdir -p /usr/local/lib/docker/cli-plugins
          download_plugin() {
            url="$1"
            target="$2"
            if command -v curl >/dev/null 2>&1; then
              sudo curl -fsSL "$url" -o "$target"
            else
              tmp_file="$(mktemp)"
              python3 -c 'import sys, urllib.request; urllib.request.urlretrieve(sys.argv[1], sys.argv[2])' "$url" "$tmp_file"
              sudo mv "$tmp_file" "$target"
            fi
          }

          if ! sudo docker compose version >/dev/null 2>&1; then
            COMPOSE_URL="https://github.com/docker/compose/releases/latest/download/docker-compose-linux-$COMPOSE_ARCH"
            download_plugin "$COMPOSE_URL" /usr/local/lib/docker/cli-plugins/docker-compose
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            sudo docker compose version >/dev/null
          fi
          BUILDX_MIN_VERSION="0.17.0"
          BUILDX_VERSION="v0.17.1"
          if current_buildx="$(sudo docker buildx version 2>/dev/null)"; then
            current_buildx_version="$(printf '%s\n' "$current_buildx" | sed -n 's/.* v\?\([0-9][0-9.]*\).*/\1/p' | head -n 1)"
          else
            current_buildx_version=""
          fi
          if [ -z "$current_buildx_version" ] || [ "$(printf '%s\n' "$BUILDX_MIN_VERSION" "$current_buildx_version" | sort -V | head -n 1)" != "$BUILDX_MIN_VERSION" ]; then
            BUILDX_URL="https://github.com/docker/buildx/releases/download/$BUILDX_VERSION/buildx-$BUILDX_VERSION.linux-$BUILDX_ARCH"
            download_plugin "$BUILDX_URL" /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-buildx
            sudo docker buildx version >/dev/null
          fi

          CURRENT_USER="$(id -un)"
          sudo mkdir -p "$APP_DIR"
          sudo chown "$CURRENT_USER":"$CURRENT_USER" "$APP_DIR"

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone --branch main "$REPOSITORY_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          mkdir -p infra/compose
          REMOTE

      - name: Upload production environment file
        run: |
          umask 077
          printf '%s\n' "$EC2_PRODUCTION_ENV" > "$RUNNER_TEMP/.env.production"
          scp -i ~/.ssh/gastroledger_ec2 -P "${EC2_PORT:-22}" \
            "$RUNNER_TEMP/.env.production" \
            "$EC2_USER@$EC2_HOST:$APP_DIR/infra/compose/.env.production"

      - name: Build, migrate, seed and restart runtime
        run: |
          ssh -i ~/.ssh/gastroledger_ec2 -p "${EC2_PORT:-22}" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$APP_DIR' bash -se" <<'REMOTE'
          set -Eeuo pipefail

          cd "$APP_DIR"
          ENV_FILE="infra/compose/.env.production"
          COMPOSE="sudo docker compose --env-file $ENV_FILE -f infra/compose/compose.yaml -f infra/compose/compose.production-like.yaml"

          test -s "$ENV_FILE"

          $COMPOSE build web api worker
          $COMPOSE up --detach --wait postgres
          mkdir -p "$HOME/gastroledger-backups"
          $COMPOSE exec -T postgres sh -c 'pg_dump -U "$POSTGRES_USER" "$POSTGRES_DB"' \
            > "$HOME/gastroledger-backups/predeploy-$(date -u +%Y%m%d%H%M%S).sql"
          $COMPOSE run --rm migrate
          $COMPOSE run --rm seed
          $COMPOSE up --detach --wait web api worker
          $COMPOSE ps
          REMOTE

  smoke-gate:
    name: smoke-gate
    if: ${{ always() }}
    needs:
      - artifact-smoke
      - deploy-ec2
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enforce safe production deployment contract
        env:
          ARTIFACT_SMOKE_RESULT: ${{ needs.artifact-smoke.result }}
          DEPLOY_EC2_RESULT: ${{ needs.deploy-ec2.result }}
        run: |
          test "$ARTIFACT_SMOKE_RESULT" = "success"
          test "$DEPLOY_EC2_RESULT" = "success"
