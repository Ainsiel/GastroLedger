name: reusable / frontend

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.13.1
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Check transport contracts
        run: npm --workspace @gastroledger/api-contract run lint

      - name: Lint frontend
        run: npm --workspace @gastroledger/web run lint

      - name: Test frontend
        run: npm --workspace @gastroledger/web run test

      - name: Build frontend
        run: npm --workspace @gastroledger/api-contract run build && npm --workspace @gastroledger/web run build
