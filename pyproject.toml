[tool.pytest.ini_options]
addopts = "-q"
pythonpath = ["apps/api", "apps/worker"]
testpaths = ["apps/api/tests", "apps/worker/tests", "tests/architecture", "tests/integration"]

[tool.ruff]
target-version = "py313"
line-length = 100
src = ["apps/api", "apps/worker", "tests/architecture", "tests/integration"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
