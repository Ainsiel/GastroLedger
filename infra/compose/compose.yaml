name: gastroledger

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ../..
      dockerfile: infra/containers/api.Dockerfile
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GL_ENVIRONMENT: base
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${API_PORT}:8000"

  worker:
    build:
      context: ../..
      dockerfile: infra/containers/worker.Dockerfile
      target: runtime
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GL_ENVIRONMENT: base
    healthcheck:
      test: ["CMD", "python", "-m", "gastroledger_worker.healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ../..
      dockerfile: infra/containers/web.Dockerfile
      target: runtime
    depends_on:
      api:
        condition: service_healthy
    environment:
      GL_ENVIRONMENT: base
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${WEB_PORT}:3000"

volumes:
  postgres-data:

