name: gastroledger

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    image: postgres:17-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGDATABASE: ${POSTGRES_DB}
      PGHOST: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER}
    command: ["sh", "-c", "for migration in /migrations/*.sql; do psql --set ON_ERROR_STOP=1 --file \"$${migration}\"; done"]
    restart: "no"
    volumes:
      - ../migrations:/migrations:ro

  api:
    image: gastroledger/api:local
    build:
      context: ../..
      dockerfile: infra/containers/api.Dockerfile
      target: runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GL_ENVIRONMENT: base
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${API_PORT}:8000"

  worker:
    image: gastroledger/worker:local
    build:
      context: ../..
      dockerfile: infra/containers/worker.Dockerfile
      target: runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GL_ENVIRONMENT: base
    healthcheck:
      test: ["CMD", "python", "-m", "gastroledger_worker.healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: gastroledger/web:local
    build:
      context: ../..
      dockerfile: infra/containers/web.Dockerfile
      target: runtime
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL: http://api:8000
      GL_ENVIRONMENT: base
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:${WEB_PORT}:3000"

volumes:
  postgres-data:
